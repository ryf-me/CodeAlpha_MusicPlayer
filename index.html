<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-glow page-glow-one" aria-hidden="true"></div>
  <div class="page-glow page-glow-two" aria-hidden="true"></div>
  <div class="grain-overlay" aria-hidden="true"></div>

  <main class="app-shell">
    <section class="player-card" aria-label="Premium music player">
      <header class="player-header">
        <div>
          <p class="eyebrow">Curated Listening Suite</p>
          <h1>Music Player</h1>
        </div>
        <div class="header-chip">
          <span class="status-dot"></span>
          <span>Immersive Playback</span>
        </div>
      </header>

      <div class="player-content">
        <section class="cover-stage" aria-label="Album artwork">
          <div class="cover-orbit cover-orbit-one"></div>
          <div class="cover-orbit cover-orbit-two"></div>
          <div class="cover-frame">
            <img
              id="cover"
              src="assets/cover1.jpg"
              alt="Album artwork for Midnight Skyline"
            >
          </div>
          <div class="cover-reflection"></div>
        </section>

        <section class="player-panel">
          <div class="song-overview">
            <div class="track-copy">
              <p class="section-label">Now Playing</p>
              <h2 id="title">Midnight Skyline</h2>
              <p id="artist">Astra Avenue</p>
            </div>
            <div class="duration-pill" id="durationBadge">--:--</div>
          </div>

          <div class="progress-panel">
            <div class="time-row" aria-label="Track timeline">
              <span id="currentTime">0:00</span>
              <span id="totalTime">0:00</span>
            </div>
            <div
              class="progress-track"
              id="progressTrack"
              role="presentation"
              aria-label="Track progress"
            >
              <div class="progress-fill" id="progressFill"></div>
              <div class="progress-thumb" id="progressThumb"></div>
            </div>
          </div>

          <div class="controls-panel" aria-label="Playback controls">
            <button class="control-button" id="prevBtn" type="button" aria-label="Previous track">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 6h2v12H7zM18 7.5v9L10.5 12 18 7.5z" fill="currentColor"></path>
              </svg>
            </button>

            <button class="control-button control-button-primary" id="playBtn" type="button" aria-label="Play">
              <svg class="icon icon-play" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 6.5v11l9-5.5-9-5.5z" fill="currentColor"></path>
              </svg>
              <svg class="icon icon-pause" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 6h3v12H8zM13 6h3v12h-3z" fill="currentColor"></path>
              </svg>
            </button>

            <button class="control-button" id="nextBtn" type="button" aria-label="Next track">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 6h2v12h-2zM6 7.5v9L13.5 12 6 7.5z" fill="currentColor"></path>
              </svg>
            </button>
          </div>

          <div class="volume-panel">
            <button class="sound-toggle" id="muteBtn" type="button" aria-label="Mute">
              <svg class="icon icon-volume" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 10h4l5-4v12l-5-4H5zM17 9.5a1 1 0 0 1 1.4 0 4 4 0 0 1 0 5.7 1 1 0 1 1-1.4-1.4 2 2 0 0 0 0-2.9 1 1 0 0 1 0-1.4z" fill="currentColor"></path>
              </svg>
              <svg class="icon icon-muted" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 10h4l5-4v12l-5-4H5zM16.1 9.5l4.4 4.4-1.4 1.4-4.4-4.4zM20.5 9.5l-4.4 4.4-1.4-1.4 4.4-4.4z" fill="currentColor"></path>
              </svg>
            </button>

            <div class="volume-slider-wrap">
              <span class="section-label">Volume</span>
              <input
                id="volumeSlider"
                class="volume-slider"
                type="range"
                min="0"
                max="100"
                value="75"
                aria-label="Volume"
              >
            </div>
          </div>
        </section>
      </div>

      <section class="playlist-panel" aria-labelledby="playlistHeading">
        <div class="playlist-header">
          <div>
            <p class="section-label">Queue</p>
            <h3 id="playlistHeading">Playlist</h3>
          </div>
          <span class="playlist-count" id="playlistCount">3 tracks</span>
        </div>
        <div class="playlist-list" id="playlist"></div>
      </section>

      <audio id="audio" preload="metadata"></audio>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
